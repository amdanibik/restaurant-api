version: "3.9"

services:
  api:
    build:
      context: ./api
    container_name: restaurant_api
    working_dir: /app
    command: >-
      sh -c "
      until bundle exec rails runner 'ActiveRecord::Base.establish_connection; ActiveRecord::Base.connection.execute(\"SELECT 1\")' >/dev/null 2>&1; do
        echo 'Waiting for MySQL...';
        sleep 2;
      done;
      bundle exec rails db:migrate &&
      bundle exec rails s -b 0.0.0.0 -p 3000
      "
    volumes:
      - ./api:/app
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: restaurant
      DB_PASSWORD: password
      DB_NAME: restaurant_development
      DB_TEST_NAME: restaurant_test
      API_KEY: development-api-key
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8
    container_name: restaurant_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: restaurant_development
      MYSQL_USER: restaurant
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: restaurant_redis
    ports:
      - "6380:6379"

volumes:
  mysql_data: