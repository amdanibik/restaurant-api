services:
  - type: web
    name: restaurant-api
    env: docker
    rootDir: api
    plan: free
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-api-db
          property: connectionString

databases:
  - name: restaurant-api-db
    plan: free